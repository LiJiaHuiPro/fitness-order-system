<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>体测接单管理系统</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; }
    body { margin: 0; background: radial-gradient(circle at top, #c7ddff 0%, #e8f1ff 30%, #f7faff 60%, #f3f6fc 100%); color: #0f172a; }
    .container { max-width: 1020px; margin: 0 auto; padding: 16px; }
    .hero {
      margin-bottom: 12px;
      padding: 22px;
      border-radius: 18px;
      background: linear-gradient(135deg, #1e3a8a, #2563eb 55%, #60a5fa);
      color: #fff;
      box-shadow: 0 16px 34px rgba(37,99,235,.30);
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: "";
      position: absolute;
      right: -30px;
      top: -30px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,.16);
    }
    .hero h1 { margin: 0 0 6px; font-size: 22px; }
    .hero p { margin: 0; opacity: .95; font-size: 14px; }
    .card { background: rgba(255,255,255,.95); backdrop-filter: blur(3px); border-radius: 14px; padding: 16px; box-shadow: 0 10px 28px rgba(2, 6, 23, 0.08); margin-bottom: 12px; border: 1px solid #e6edf9; }
    h2, h3 { margin: 0 0 12px; }
    input, select, textarea, button { width: 100%; padding: 11px; border-radius: 10px; border: 1px solid #d7e0ef; margin-bottom: 10px; font-size: 14px; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    button { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff; border: none; cursor: pointer; font-weight: 600; transition: transform .08s ease, box-shadow .2s ease, opacity .2s ease; }
    button:hover { box-shadow: 0 8px 16px rgba(37,99,235,.28); }
    button:active { transform: translateY(1px); }
    button.secondary { background: linear-gradient(135deg, #64748b, #475569); }
    button.success { background: linear-gradient(135deg, #16a34a, #15803d); }
    button.light { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .grid { display: grid; gap: 12px; }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .row .btn-fit { width: auto; min-width: 120px; }
    .row .grow { flex: 1; min-width: 160px; }
    .badge { padding: 2px 8px; border-radius: 999px; font-size: 12px; }
    .pending { background: #fef3c7; }
    .in_progress { background: #dbeafe; }
    .completed { background: #dcfce7; }
    .cancelled { background: #e5e7eb; }
    .hidden { display: none; }
    .order { border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; margin-bottom: 10px; background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%); transition: box-shadow .2s ease, transform .08s ease; }
    .order:hover { box-shadow: 0 8px 20px rgba(15,23,42,.08); transform: translateY(-1px); }
    .muted { color: #6b7280; font-size: 13px; }
    .stat { text-align: center; padding: 14px; border-radius: 12px; background: #f8fbff; border: 1px solid #dbeafe; }
    .stat b { display: block; font-size: 24px; margin-top: 6px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tabs button { margin-bottom: 0; }
    .hint { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; padding: 9px 10px; border-radius: 10px; font-size: 13px; margin-bottom: 10px; }
    .worker-chip { display: inline-block; padding: 6px 10px; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 999px; margin: 0 8px 8px 0; font-size: 13px; color: #1e3a8a; }
    .assign-worker-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .assign-worker-option {
      width: auto;
      margin: 0;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: 13px;
      font-weight: 600;
    }
    .assign-worker-option.active {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-color: #1d4ed8;
      color: #fff;
    }
    .section-title { display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 999px; background: #3b82f6; }
    .project-picker { margin-bottom: 10px; }
    .gender-options { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .project-options { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    .project-option,
    .gender-option {
      margin: 0;
      border: 1px solid #bfdbfe;
      background: #f8fbff;
      color: #1e3a8a;
      border-radius: 999px;
      min-height: 38px;
      padding: 0 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .project-option.active,
    .gender-option.active {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-color: #1d4ed8;
      color: #fff;
      box-shadow: 0 6px 14px rgba(37,99,235,.28);
    }
    .field-hint { margin: 6px 0 0; color: #64748b; font-size: 12px; }
    @media (max-width: 640px) {
      .container { padding: 10px; }
      .hero { padding: 14px; border-radius: 12px; }
      .hero h1 { font-size: 19px; }
      .card { padding: 12px; border-radius: 12px; }
      .tabs { flex-direction: column; }
      .row .btn-fit { width: 100%; }
      .stat b { font-size: 20px; }
      .assign-worker-option { min-height: 38px; }
      .gender-option { min-height: 44px; font-size: 15px; }
      .project-options { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .project-option { min-height: 44px; font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>体测接单管理系统</h1>
    </div>

    <div id="publicView" class="card">
      <div class="tabs">
        <button id="showClientBtn" class="light">学生下单</button>
        <button id="showStaffBtn" class="secondary">接单后台登录/注册</button>
      </div>

      <div id="clientBox">
        <h3 class="section-title"><span class="dot"></span>学生下单</h3>
        <div class="grid grid-2">
          <input id="cName" placeholder="姓名" />
          <input id="cStudentNo" placeholder="学号" />
          <div class="project-picker">
            <input id="cGender" type="hidden" />
            <div class="gender-options">
              <button type="button" class="gender-option" data-gender-option="男">男</button>
              <button type="button" class="gender-option" data-gender-option="女">女</button>
            </div>
          </div>
          <div class="project-picker" style="grid-column: 1 / -1;">
            <input id="cProject" type="hidden" />
            <div class="project-options">
              <button type="button" class="project-option" data-project-option="50米">50米</button>
              <button type="button" class="project-option" data-project-option="800米">800米</button>
              <button type="button" class="project-option" data-project-option="1000米">1000米</button>
              <button type="button" class="project-option" data-project-option="立定跳远">立定跳远</button>
              <button type="button" class="project-option" data-project-option="坐位体前屈">坐位体前屈</button>
              <button type="button" class="project-option" data-project-option="肺活量">肺活量</button>
              <button type="button" class="project-option" data-project-option="仰卧起坐">仰卧起坐</button>
              <button type="button" class="project-option" data-project-option="引体向上">引体向上</button>
            </div>
            <p class="field-hint">体测项目可多选</p>
          </div>
        </div>
        <textarea id="cRequirement" rows="2" placeholder="要求"></textarea>
        <input id="cRemark" placeholder="微信名（必填）" />
        <button id="createPublicOrderBtn">提交订单</button>
        <p id="clientMsg"></p>
      </div>

      <div id="staffBox" class="hidden">
        <div class="row">
          <button id="showLoginBtn" class="btn-fit secondary">登录</button>
          <button id="showRegisterBtn" class="btn-fit light">注册接单人</button>
        </div>
        <div id="loginBox">
          <h3 class="section-title"><span class="dot"></span>后台登录</h3>
          <input id="loginUsername" placeholder="账号" />
          <input id="loginPassword" type="password" placeholder="密码" />
          <button id="loginBtn">进入系统</button>
        </div>
        <div id="registerBox" class="hidden">
          <h3 class="section-title"><span class="dot"></span>接单人注册</h3>
          <div class="hint">请务必使用真实姓名注册，方便核对接单记录。</div>
          <input id="regUsername" placeholder="真实姓名（唯一）" />
          <input id="regPassword" type="password" placeholder="密码" />
          <button id="registerBtn">创建接单人账号</button>
        </div>
        <p id="authMsg"></p>
      </div>
    </div>

    <div id="appView" class="hidden">
      <div class="card">
        <div class="row" style="justify-content:space-between;align-items:center;">
          <h2 id="welcome"></h2>
          <button id="logoutBtn" class="secondary" style="width:auto;">退出登录</button>
        </div>
      </div>

      <div id="workerPanel" class="hidden">
        <div class="card">
          <h3>抢单大厅（待抢单）</h3>
          <div id="hallOrders"></div>
        </div>
        <div class="card">
          <h3>接单记录</h3>
          <div id="workerOrders"></div>
        </div>
      </div>

      <div id="adminPanel" class="hidden">
        <div class="card">
          <h3>管理员全屏数据</h3>
          <div class="grid grid-2" id="adminStats"></div>
        </div>
        <div class="card">
          <h3>接单人概览</h3>
          <div id="adminWorkers"></div>
        </div>
        <div class="card">
          <h3>待接订单</h3>
          <div id="adminPendingOrders"></div>
        </div>
        <div class="card">
          <h3>已接订单</h3>
          <div id="adminTakenOrders"></div>
        </div>
        <div class="card">
          <div class="row" style="justify-content:space-between;align-items:center;">
            <h3 style="margin:0;">全部订单</h3>
            <button id="clearOrdersBtn" class="secondary" style="width:auto;">清空订单数据</button>
          </div>
          <div id="adminOrders"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const SESSION_KEY = "tm_server_session";
    const readSession = () => JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
    const writeSession = (v) => localStorage.setItem(SESSION_KEY, JSON.stringify(v));
    const clearSession = () => localStorage.removeItem(SESSION_KEY);
    const api = async (url, options = {}) => {
      const session = readSession();
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (session?.token) headers.Authorization = `Bearer ${session.token}`;
      const res = await fetch(url, { ...options, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message || "请求失败");
      return data;
    };

    function statusText(s) {
      return ({ pending: "待抢单", in_progress: "进行中", completed: "已完成", cancelled: "已取消" })[s] || s;
    }
    const PROJECTS = ["50米", "800米", "1000米", "立定跳远", "坐位体前屈", "肺活量", "仰卧起坐", "引体向上"];
    function normalizeProject(raw) {
      const text = String(raw || "").replace(/\s+/g, "").toLowerCase();
      if (!text) return "";
      if (text.includes("1000")) return "1000米";
      if (text.includes("800")) return "800米";
      if (text.includes("50")) return "50米";
      if (text.includes("引体")) return "引体向上";
      if (text.includes("仰卧")) return "仰卧起坐";
      if (text.includes("跳远")) return "立定跳远";
      if (text.includes("体前屈")) return "坐位体前屈";
      if (text.includes("肺活量")) return "肺活量";
      return PROJECTS.find((p) => text.includes(p)) || "";
    }
    function renderOrder(order, actionHtml = "") {
      const createdAtText = order.createdAt ? new Date(order.createdAt).toLocaleString("zh-CN") : "-";
      return `
      <div class="order">
        <div><b>${order.name}</b>（${order.studentNo}） - ${order.project}</div>
        <div class="muted">学生：${order.clientUsername} | 下单时间：${createdAtText}</div>
        <div class="muted">性别：${order.gender || "-"} | 微信名：${order.remark || "-"}</div>
        <div class="muted">要求：${order.requirement || "-"}</div>
        <div class="muted">接单人：${order.workerUsername || "暂无"} | <span class="badge ${order.status}">${statusText(order.status)}</span></div>
        ${actionHtml}
      </div>`;
    }
    function renderAdminPendingOrder(order, workers) {
      const createdAtText = order.createdAt ? new Date(order.createdAt).toLocaleString("zh-CN") : "-";
      const disabled = workers.length ? "" : "disabled";
      const options = workers.map((w) => `
        <button type="button" class="assign-worker-option" data-assign-worker-option="${order.id}" data-worker-id="${w.id}">
          ${w.username}
        </button>
      `).join("");
      return `
      <div class="order">
        <div><b>${order.name}</b>（${order.studentNo}） - ${order.project}</div>
        <div class="muted">学生：${order.clientUsername} | 下单时间：${createdAtText}</div>
        <div class="muted">性别：${order.gender || "-"} | 微信名：${order.remark || "-"}</div>
        <div class="muted">要求：${order.requirement || "-"}</div>
        <input type="hidden" data-assign-worker="${order.id}" />
        <div class="assign-worker-options">${options || '<span class="muted">暂无可指派接单人</span>'}</div>
        <div class="row" style="margin-top:8px;">
          <button class="btn-fit" data-assign="${order.id}" ${disabled}>指派</button>
        </div>
      </div>`;
    }
    function showMsg(id, text, ok = false) {
      const el = $(id);
      el.textContent = text;
      el.style.color = ok ? "#16a34a" : "#dc2626";
    }
    function mapOrder(row) {
      return {
        id: row.id,
        name: row.client_name,
        studentNo: row.student_no,
        project: normalizeProject(row.project) || row.project,
        amount: row.amount,
        requirement: row.requirement,
        remark: row.remark,
        gender: row.gender,
        status: row.status,
        workerId: row.worker_id,
        workerUsername: row.worker_username,
        clientUsername: row.client_name,
        createdAt: row.created_at
      };
    }

    function bindAuth() {
      const selectedProjects = new Set();
      const bindProjectPicker = () => {
        document.querySelectorAll("[data-project-option]").forEach((btn) => {
          btn.onclick = () => {
            const project = btn.getAttribute("data-project-option") || "";
            if (!project) return;
            if (selectedProjects.has(project)) {
              selectedProjects.delete(project);
              btn.classList.remove("active");
            } else {
              selectedProjects.add(project);
              btn.classList.add("active");
            }
            $("cProject").value = JSON.stringify(Array.from(selectedProjects));
          };
        });
      };
      const bindGenderPicker = () => {
        document.querySelectorAll("[data-gender-option]").forEach((btn) => {
          btn.onclick = () => {
            document.querySelectorAll("[data-gender-option]").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            $("cGender").value = btn.getAttribute("data-gender-option") || "";
          };
        });
      };
      bindProjectPicker();
      bindGenderPicker();
      $("showClientBtn").onclick = () => {
        $("clientBox").classList.remove("hidden");
        $("staffBox").classList.add("hidden");
      };
      $("showStaffBtn").onclick = () => {
        $("staffBox").classList.remove("hidden");
        $("clientBox").classList.add("hidden");
      };
      $("showLoginBtn").onclick = () => {
        $("loginBox").classList.remove("hidden");
        $("registerBox").classList.add("hidden");
      };
      $("showRegisterBtn").onclick = () => {
        $("registerBox").classList.remove("hidden");
        $("loginBox").classList.add("hidden");
      };
      $("registerBtn").onclick = () => {
        const username = $("regUsername").value.trim();
        const password = $("regPassword").value.trim();
        api("/api/auth/register-worker", {
          method: "POST",
          body: JSON.stringify({ username, password })
        })
          .then((d) => showMsg("authMsg", d.message, true))
          .catch((e) => showMsg("authMsg", e.message));
      };
      $("loginBtn").onclick = () => {
        const username = $("loginUsername").value.trim();
        const password = $("loginPassword").value.trim();
        api("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({ username, password })
        })
          .then((d) => {
            writeSession({ token: d.token, user: d.user });
            renderApp();
          })
          .catch((e) => showMsg("authMsg", e.message));
      };
      $("logoutBtn").onclick = () => {
        clearSession();
        $("publicView").classList.remove("hidden");
        $("appView").classList.add("hidden");
      };
      $("createPublicOrderBtn").onclick = () => {
        const payload = {
          name: $("cName").value.trim(),
          studentNo: $("cStudentNo").value.trim(),
          gender: $("cGender").value.trim(),
          projects: JSON.parse($("cProject").value || "[]"),
          requirement: $("cRequirement").value.trim(),
          remark: $("cRemark").value.trim()
        };
        if (!payload.name || !payload.studentNo || !payload.gender || !payload.projects.length || !payload.remark) {
          return showMsg("clientMsg", "姓名/学号/性别/项目(可多选)/微信名必填");
        }
        api("/api/orders", {
          method: "POST",
          body: JSON.stringify(payload)
        })
          .then(() => {
            ["cName", "cStudentNo", "cGender", "cProject", "cRequirement", "cRemark"].forEach((id) => $(id).value = "");
            document.querySelectorAll("[data-gender-option]").forEach((b) => b.classList.remove("active"));
            document.querySelectorAll("[data-project-option]").forEach((b) => b.classList.remove("active"));
            selectedProjects.clear();
            showMsg("clientMsg", "下单成功", true);
          })
          .catch((e) => showMsg("clientMsg", e.message));
      };
    }

    function renderWorker(user) {
      $("workerPanel").classList.remove("hidden");
      const refresh = async () => {
        const hallRows = await api("/api/orders/hall").catch(() => []);
        const mineRows = await api("/api/orders/mine").catch(() => []);
        const hall = hallRows.map(mapOrder).sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
        const mine = mineRows.map(mapOrder);
        if (hall.length) {
          const groupedHall = hall.reduce((acc, order) => {
            const key = normalizeProject(order.project);
            if (!key) return acc;
            acc[key] = acc[key] || [];
            acc[key].push(order);
            return acc;
          }, {});
          const groupedHtml = Object.entries(groupedHall).map(([project, list]) => `
            <div style="margin-bottom:12px;">
              <h4 style="margin:0 0 8px;">${project}（${list.length}单）</h4>
              ${list.map((o) => renderOrder(o, `<button data-accept="${o.id}">接单</button>`)).join("")}
            </div>
          `).join("");
          $("hallOrders").innerHTML = groupedHtml || '<p class="muted">暂无可抢订单</p>';
        } else {
          $("hallOrders").innerHTML = '<p class="muted">暂无可抢订单</p>';
        }
        $("workerOrders").innerHTML = mine.length
          ? mine.map((o) => renderOrder(o, o.status === "in_progress" ? `<button class="success" data-complete="${o.id}">标记完成</button>` : "")).join("")
          : '<p class="muted">暂无接单记录</p>';
        document.querySelectorAll("[data-accept]").forEach((btn) => {
          btn.onclick = async () => {
            const id = btn.getAttribute("data-accept");
            await api(`/api/orders/${id}/accept`, { method: "POST" }).catch((e) => alert(e.message));
            refresh();
          };
        });
        document.querySelectorAll("[data-complete]").forEach((btn) => {
          btn.onclick = async () => {
            const id = btn.getAttribute("data-complete");
            await api(`/api/orders/${id}/complete`, { method: "POST" }).catch((e) => alert(e.message));
            refresh();
          };
        });
      };
      refresh();
    }

    function renderAdmin() {
      $("adminPanel").classList.remove("hidden");
      const clearBtn = $("clearOrdersBtn");
      if (clearBtn) {
        clearBtn.onclick = async () => {
          if (!confirm("确认清空全部订单数据？此操作不可恢复。")) return;
          await api("/api/admin/orders", { method: "DELETE" }).catch((e) => alert(e.message));
          renderAdmin();
        };
      }
      Promise.all([api("/api/admin/stats"), api("/api/admin/orders"), api("/api/admin/workers")]).then(([stats, rows, workers]) => {
        const total = stats.total;
        const pending = stats.pending;
        const progress = stats.inProgress;
        const done = stats.completed;
        const rate = total ? ((done / total) * 100).toFixed(1) + "%" : "0%";
        const projectStats = rows.reduce((acc, row) => {
          const key = normalizeProject(row.project);
          if (!key) return acc;
          if (!acc[key]) acc[key] = { total: 0, pending: 0, in_progress: 0, completed: 0 };
          acc[key].total += 1;
          acc[key][row.status] = (acc[key][row.status] || 0) + 1;
          return acc;
        }, {});
        const projectStatsHtml = Object.entries(projectStats).map(([project, s]) => `
          <div class="order" style="margin-bottom:8px;">
            <div><b>${project}</b></div>
            <div class="muted">总数：${s.total} | 待抢单：${s.pending || 0} | 进行中：${s.in_progress || 0} | 已完成：${s.completed || 0}</div>
          </div>
        `).join("") || '<p class="muted">暂无项目统计</p>';
        $("adminStats").innerHTML = `
          <div class="stat">总订单<b>${total}</b></div>
          <div class="stat">待抢单<b>${pending}</b></div>
          <div class="stat">进行中<b>${progress}</b></div>
          <div class="stat">已完成<b>${done}</b></div>
          <div class="stat">完成率<b>${rate}</b></div>
          <div style="grid-column: 1 / -1; text-align:left;">
            <h4 style="margin:4px 0 10px;">按项目分类统计</h4>
            ${projectStatsHtml}
          </div>
        `;
        const orders = rows.map(mapOrder);
        $("adminWorkers").innerHTML = workers.length
          ? workers.map((w) => `<span class="worker-chip">${w.username}（进行中:${w.in_progress_count || 0}，已完成:${w.completed_count || 0}）</span>`).join("")
          : '<p class="muted">暂无接单人</p>';
        const pendingOrders = orders
          .filter((o) => o.status === "pending")
          .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
        const takenOrders = orders.filter((o) => o.status !== "pending");
        $("adminPendingOrders").innerHTML = pendingOrders.length
          ? pendingOrders.map((o) => renderAdminPendingOrder(o, workers)).join("")
          : '<p class="muted">暂无待接订单</p>';
        $("adminTakenOrders").innerHTML = takenOrders.length
          ? takenOrders.map((o) => renderOrder(o, `<button class="secondary" data-delete="${o.id}">删除订单</button>`)).join("")
          : '<p class="muted">暂无已接订单</p>';
        $("adminOrders").innerHTML = orders.length
          ? orders.map((o) => renderOrder(o, `<button class="secondary" data-delete="${o.id}">删除订单</button>`)).join("")
          : '<p class="muted">暂无订单</p>';
        document.querySelectorAll("[data-assign]").forEach((btn) => {
          btn.onclick = async () => {
            const id = btn.getAttribute("data-assign");
            const workerSelect = document.querySelector(`[data-assign-worker="${id}"]`);
            const workerId = Number(workerSelect?.value || 0);
            if (!workerId) return alert("请先选择接单人");
            await api(`/api/admin/orders/${id}/assign`, {
              method: "POST",
              body: JSON.stringify({ workerId })
            }).catch((e) => alert(e.message));
            renderAdmin();
          };
        });
        document.querySelectorAll("[data-assign-worker-option]").forEach((btn) => {
          btn.onclick = () => {
            const orderId = btn.getAttribute("data-assign-worker-option");
            const workerId = btn.getAttribute("data-worker-id");
            if (!orderId || !workerId) return;
            document.querySelectorAll(`[data-assign-worker-option="${orderId}"]`).forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            const hidden = document.querySelector(`[data-assign-worker="${orderId}"]`);
            if (hidden) hidden.value = workerId;
          };
        });
        document.querySelectorAll("[data-delete]").forEach((btn) => {
          btn.onclick = async () => {
            const id = btn.getAttribute("data-delete");
            if (!confirm("确认删除这个订单？")) return;
            await api(`/api/admin/orders/${id}`, { method: "DELETE" }).catch((e) => alert(e.message));
            renderAdmin();
          };
        });
      }).catch(() => {
        $("adminStats").innerHTML = '<p class="muted">加载失败，请重试</p>';
      });
    }

    function renderApp() {
      const session = readSession();
      const user = session?.user || null;
      if (!user) {
        $("publicView").classList.remove("hidden");
        $("appView").classList.add("hidden");
        return;
      }
      $("publicView").classList.add("hidden");
      $("appView").classList.remove("hidden");
      $("welcome").textContent = `你好，${user.username}（${user.role === "worker" ? "接单人" : "管理员"}）`;
      ["workerPanel", "adminPanel"].forEach((id) => $(id).classList.add("hidden"));
      if (user.role === "worker") renderWorker(user);
      if (user.role === "admin") renderAdmin();
    }

    bindAuth();
    renderApp();
  </script>
</body>
</html>
